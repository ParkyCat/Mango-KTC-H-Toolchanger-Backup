# [gcode_macro CHANGE_FILAMENT]
# description: "Unload, load, and purge filament in one macro"
# gcode:
#     M83                             ; Set extruder to relative mode
#     SET_HEATER_TEMPERATURE HEATER=extruder TARGET=220    ; Heat hotend to 220°C (PETG/ABS)
#     TEMPERATURE_WAIT SENSOR=extruder MINIMUM=210         ; Wait for hotend temp

#     ; --- Unload filament ---
#     G92 E0                          ; Reset extruder position
#     G1 E2 F120                     ; Small push to relieve pressure
#     G1 E-8 F120                    ; Slow retract to avoid grinding
#     G1 E-60 F1500                  ; Fast retract to pull filament out
#     G92 E0                         ; Reset extruder position


#     SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250    ; Heat hotend to 220°C (PETG/ABS)
#     RESPOND MSG="Unload complete. Insert new filament and click Resume."  ; Prompt user
#     PAUSE                          ; Pause for manual filament insertion

#     ; --- Load filament ---
#     G92 E0                         ; Reset extruder position
#     G1 E40 F300                   ; Slowly push filament into hotend
#     G4 S2                         ; Wait 2 seconds for filament to melt in
#     G1 E10 F100                   ; Extrude a little more to ensure flow
#     G92 E0                        ; Reset extruder position

#     ; --- Purge filament ---
#     G1 E10 F300                   ; Slow initial extrusion for purge
#     G4 S2                         ; Wait 2 seconds for filament to ooze
#     G1 E20 F600                   ; Faster extrusion to clean nozzle
#     G4 S1                         ; Wait 1 second to finish purge
#     G1 E-5.0 F1800                 ; retract filament
#     SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0       ; Turn off hotend heater
#     G92 E0                        ; Reset extruder position
    

#     M82                            ; Set extruder back to absolute mode


[gcode_macro _TAP_PROBE_ACTIVATE]
description: Ensure safe temp for bed probing
gcode:
    {% set max_temp = 150 %}
    {% set actual_temp = printer[params.HEATER].temperature %}
    {% set target_temp = printer[params.HEATER].target %}
    {% if target_temp > max_temp %}
        { action_respond_info('Extruder temperature target of %.1fC is too high, lowering to %.1fC' % (target_temp, max_temp)) }
        SET_HEATER_TEMPERATURE HEATER={params.HEATER} TARGET={ max_temp|int - 5 }
    {% endif %}
    # Temperature target is already low enough, but nozzle may still be too hot.
    {% if actual_temp > max_temp  + 2 %}
        { action_respond_info('Extruder temperature %.1fC is still too high, waiting until below %.1fC' % (actual_temp, max_temp)) }
        TEMPERATURE_WAIT SENSOR={params.HEATER} MAXIMUM={ max_temp }
    {% endif %}

