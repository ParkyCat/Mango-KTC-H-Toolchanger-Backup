[gcode_macro PURGE_T0]
description: "Purge filament after loading (PETG/ABS)"
gcode:
    M83                                                     ; Set extruder to relative mode
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250       ; Heat hotend to 220°C
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=240            ; Wait for temperature
    G92 E0                                                  ; Reset extruder position
    G1 E10 F300                                             ; Slow initial extrude
    G4 S2                                                   ; Wait 2 seconds
    G1 E50 F600                                             ; Faster purge
    G4 S1                                                   ; Wait for ooze
    G1 E-4 F1800                    ; Retract slightly
    
    M400                             ; Wait for move to finish
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0       ; Turn off hotend heater
    G92 E0                                                  ; Reset position again
    RESPOND MSG="Purge complete. Clean nozzle if needed."    
