

[gcode_macro LOAD_FILAMENT]
description: "Load filament with combined UI for extrusion and temperature control."
variable_selected_temp: 210
gcode:
  {% set p = printer %}
  {% set purge_macro = p["gcode_macro _PURGE"] %}

  {% if p.toolhead.homed_axes != "xyz" and p.configfile.settings.toolchanger.on_axis_not_homed == 'home' %}
    _DEBUG_RESPOND MSG="$LOAD_FILAMENT$ | homing first."
    G28
  {% endif %}
  {% if p.toolhead.homed_axes != "xyz" and p.configfile.settings.toolchanger.on_axis_not_homed != 'home' %}
    _WARNING_RESPOND MSG="$LOAD_FILAMENT$ | cannot load filament, printer not homed."
  {% else %}
    {% if p.tool_probe_endstop.active_tool_number|int == -1 %}
      RESPOND TYPE=error MSG="No active tool selected. Please select a tool first."
    {% else %}

      {% if params.HEAT is defined %}
        # ─── Heating to selected temperature ───
        {% set temp = params.HEAT|int %}
        M104 S{temp}
        SET_GCODE_VARIABLE MACRO=LOAD_FILAMENT VARIABLE=selected_temp VALUE={temp}

      {% elif params.EXTRUDE is defined %}
        # ─── Extrude filament ───
        M109 S{selected_temp}
        {% set extrude = params.EXTRUDE|float %}
        {% set speed = params.SPEED|float|d(1000) %}
        _PURGE LENGTH={extrude} FEEDRATE={speed}
        M104 S{selected_temp}
      {% elif params.DONE is defined %}
        # ─── Done loading ───
        RESPOND TYPE=command MSG="action:prompt_end"
        # Turn off heater
        M104 S0

        # Lift up slightly before returning
        G91
        G0 Z5 F300
        G90

        # Restore original position with rounded_g0
        RESTORE_GCODE_STATE NAME=before_loadfilament #MOVE=1

      {% else %}
        # ─── First call, move to bucket and start UI ───
        SAVE_GCODE_STATE NAME=before_loadfilament

        MOVE_OVER_BUCKET

        M104 S{selected_temp}

        RESPOND TYPE=command MSG="action:prompt_begin Load Filament"
        RESPOND TYPE=command MSG="action:prompt_button_group_start"
        RESPOND TYPE=command MSG="action:prompt_button 10mm|LOAD_FILAMENT EXTRUDE=10 SPEED=375|primary"
        RESPOND TYPE=command MSG="action:prompt_button 50mm|LOAD_FILAMENT EXTRUDE=50 SPEED=375|accent"
        RESPOND TYPE=command MSG="action:prompt_button 100mm|LOAD_FILAMENT EXTRUDE=100 SPEED=375|info"
        RESPOND TYPE=command MSG="action:prompt_button_group_end"

        RESPOND TYPE=command MSG="action:prompt_footer_button 210°C|LOAD_FILAMENT HEAT=210|primary"
        RESPOND TYPE=command MSG="action:prompt_footer_button 240°C|LOAD_FILAMENT HEAT=240|warning"
        RESPOND TYPE=command MSG="action:prompt_footer_button ✅|LOAD_FILAMENT DONE=1|success"

        RESPOND TYPE=command MSG="action:prompt_show"
      {% endif %}

    {% endif %}
  {% endif %}


[gcode_macro M104]
rename_existing: M104.1
description: [T<index>] [S<temperature>]
  Set tool temperature.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE{newparameters}
  {% else %}
    M104.1 {rawparams}
  {% endif %}

[gcode_macro M109]
rename_existing: M109.1
description: [T<index>] [S<temperature>]
  Set tool temperature and wait.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE WAIT=1 {newparameters}
  {% else %}
    M109.1 {rawparams}
  {% endif %}


[gcode_macro SAVE_TOOLTEMP_STATE]
description: Save tool heater targets for later RESTORE_TOOLTEMP_STATE
variable_slots: {}
gcode:
    {% set name = params.NAME|default('default') %}
    {% set targets = {} %}
    {% for _name in printer.toolchanger.tool_names if printer.toolchanger %}
        {% set tool = printer[_name] %}
        {% if tool.extruder %}
            {% set _ = targets.update( {tool.tool_number: printer[tool.extruder].target} ) %}
        {% endif %}
    {% else %}
        RESPOND TYPE=error MSG="SAVE_TOOLTEMP_STATE: missing [toolchanger]"
    {% endfor %}
    {% for tn, _ in targets.items() if params.DISABLE|default(0)|int %}
        M104 T{tn} S0
    {% endfor %}
    {% set _ = slots.update( {name: targets} ) %}
    SET_GCODE_VARIABLE MACRO=SAVE_TOOLTEMP_STATE VARIABLE=slots VALUE="{slots}"

[gcode_macro RESTORE_TOOLTEMP_STATE]
description: Restore tool heater targets saved by SAVE_TOOLTEMP_STATE
gcode:
    {% set name = params.NAME|default('default') %}
    {% set slots = printer['gcode_macro SAVE_TOOLTEMP_STATE'].slots %}
    {% set targets = slots.get(name, {}) %}
    {% for tn, target in targets.items() if targets %}
        M104 T{tn} S{target}
    {% else %}
        RESPOND TYPE=error MSG="RESTORE_TOOLTEMP_STATE: missing state '{name}'"
    {% endfor %}
    {% for tn, target in targets.items() if params.WAIT|default(1)|int %}
        M109 T{tn} S{target}
    {% endfor %}
    {% set _ = slots.pop(name, None) %}
    SET_GCODE_VARIABLE MACRO=SAVE_TOOLTEMP_STATE VARIABLE=slots VALUE="{slots}"














[gcode_macro UNLOAD_T0]
gcode:
   M83                            ; set extruder to relative
    {% set TEMP = params.TEMP|default(230)|int %}  ; Default to 230 °C unless TEMP=xxx passed
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={TEMP}  ; Heat extruder
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={TEMP}       ; Wait until hotend reaches target temp
    G92 E0                           ; Zero extruder position
    G1 E30 F800                      ; Purge a few mm to push out residue and clear nozzle
    G1 E-16 F1200                    ; Retract slightly to start forming a tapered tip
    M400                             ; Wait for purge move to finish
    G4 P2000                         ; Pause 4 s to allow the melt to settle
    G1 E-15 F1200                    ; Retract slightly to start forming a tapered tip
    M400                             ; Wait for purge move to finish
    G4 P2000                         ; Pause 4 s to allow the melt to settle
    G1 E-15 F1200                    ; Retract slightly to start forming a tapered tip
    M400                             ; Wait for purge move to finish
    G4 P2000                         ; Wait 2 s to let the tip cool slightly (prevents stringy ends)
    G1 E-90 F1200                    ; Retract full filament out of the melt zone (adjust if needed)
    M400                             ; Wait for movement to finish
    G92 E0                           ; Reset extruder position
    M82                                                     ; Back to absolute mode
