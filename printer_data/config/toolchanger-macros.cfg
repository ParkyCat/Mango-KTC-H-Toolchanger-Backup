[gcode_macro LOAD_T0]
description: "Manual load filament for PETG or ABS (no sensor)"
gcode:
    M83                                                     ; Set extruder to relative mode
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=230       ; Heat to 220C
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=200            ; Wait for target temp
    G92 E0                                                  ; Reset extruder position
    # RESPOND MSG="Insert filament now, then resume"          ; Prompt user
    # PAUSE                                                   ; Wait for user to insert filament
    G1 E40 F800                                             ; Slowly push filament into hotend
    G1 E40 F400                                             ; Extrude to verify flow
    G1 E-4 F1800                    ; Retract slightly
    G92 E0                                                  ; Reset position
  
    M400                             ; Wait for move to finish
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0       ; Turn off hotend heater
    M82                                                     ; Back to absolute mode
