# [heater_chamber_fan chamber]
# # Sensor (same options as other heaters)
# sensor_type: Generic 3950
# sensor_pin: PC5
# pullup: True

# fan_pin: PF6

# min_temp: 0                         # °C (>= -273.15)
# max_temp: 80                        # °C (> min_temp)
# control: pid                        # pid | watermark
# smooth_time: 5.0                    # s, temp smoothing before control

# min_power: 0.10                     # lower bound while controlling (wont go below this even if above temp)
# max_power: 0.80                     # upper bound (wont go above this duty even if below temp)

# gate_against: heater_bed            # default is heater_bed. just exists to prevent a TEMPERATURE_WAIT for something it physically cannot reach.
# gate_mode: target                   # target | current | either | None

# auto_linger: True                   # start linger when print finishes
# linger_time: 180                    # seconds
# linger_power: 0.20                  # duty during linger
# FAN_MIN_TIME: 1



# [bed_mesh]
# speed: 200
# horizontal_move_z: 5
# mesh_min: 10,10
# mesh_max: 340,340
# probe_count: 7,7
# algorithm: bicubic
# bicubic_tension: 0.2

# [display]
# #	mini12864 LCD Display
# lcd_type: uc1701
# cs_pin: EXP1_3
# a0_pin: EXP1_4
# rst_pin: EXP1_5
# encoder_pins: ^EXP2_5, ^EXP2_3
# click_pin: ^!EXP1_2
# contrast: 63
# spi_software_miso_pin: EXP2_1
# spi_software_mosi_pin: EXP2_6
# spi_software_sclk_pin: EXP2_2

# [neopixel btt_mini12864]
# #	To control Neopixel RGB in mini12864 display
# pin: EXP1_6
# chain_count: 3
# initial_RED: 0.1
# initial_GREEN: 0.5
# initial_BLUE: 0.0
# color_order: RGB

##	Set RGB values on boot up for each Neopixel. 
##	Index 1 = display, Index 2 and 3 = Knob
# [delayed_gcode setdisplayneopixel]
# initial_duration: 1
# gcode:
#        SET_LED LED=btt_mini12864 RED=1 GREEN=1 BLUE=1 INDEX=1 TRANSMIT=0
#        SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=2 TRANSMIT=0
#        SET_LED LED=btt_mini12864 RED=1 GREEN=0 BLUE=0 INDEX=3 



