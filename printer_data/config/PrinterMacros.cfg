[neopixel case_leds]
# pin: PD15
pin: PE9
chain_count: 8
color_order: GRB
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0


[gcode_macro LCDRGB]
gcode:
    {% set r = params.R|default(0)|float %}
    {% set g = params.G|default(0)|float %}
    {% set b = params.B|default(0)|float %}

    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=1 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=2 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=3 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=4 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=5 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=6 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=7 TRANSMIT=0
    SET_LED LED=case_leds RED={r} GREEN={g} BLUE={b} INDEX=8


[gcode_macro INITIAL_RGB]
gcode:
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=1 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=2 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=3 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=4 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=5 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=6 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=7 TRANSMIT=0
    SET_LED LED=case_leds RED=0.55 GREEN=0.5 BLUE=0.45 INDEX=8

[delayed_gcode SETDISPLAYNEOPIXEL]
initial_duration: 1
gcode:
    INITIAL_RGB



[gcode_macro CASELIGHT_OFF]
description: Helper: Light off
gcode:
  _SET_CASE_LEDS R=0
  _SET_CASE_LEDS G=0
  _SET_CASE_LEDS B=0



[gcode_macro M104]
rename_existing: M104.1
description: [T<index>] [S<temperature>]
  Set tool temperature.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE{newparameters}
  {% else %}
    M104.1 {rawparams}
  {% endif %}

[gcode_macro M109]
rename_existing: M109.1
description: [T<index>] [S<temperature>]
  Set tool temperature and wait.
  T= Tool number, optional. If this parameter is not provided, the current tool is used.
  S= Target temperature
gcode:
  {% if params.T is defined %}
    {% set newparameters = "" %}
    {% set newparameters = newparameters ~ " T="~params.T %}
    {% if params.S is defined %}
      {% set newparameters = newparameters ~ " TARGET="~params.S %}
    {% endif %}
    SET_TOOL_TEMPERATURE WAIT=1 {newparameters}
  {% else %}
    M109.1 {rawparams}
  {% endif %}

