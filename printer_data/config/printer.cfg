[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

# Enable object exclusion
[exclude_object]

# Enable arcs support
[gcode_arcs]
resolution: 0.3



[gcode_macro COOLDOWN]
description: "Cooldown hotend and bed, turn off fan, park nozzle"
gcode:
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0       ; Turn off hotend heater
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=0     ; Turn off bed heater
    M106 S0                                                ; Turn off fan
    G1 X10 Y10 Z150 F6000                                 ; Move nozzle to safe position (adjust coords as needed)


[quad_gantry_level]
gantry_corners:
	-60,-10
	410,420
points:
	50,45
	50,275
	300,275
	300,45

#--------------------------------------------------------------------
speed: 400
retries: 12
retry_tolerance: 0.01
max_adjust: 5

[bed_mesh]
speed: 200
horizontal_move_z: 5
mesh_min: 10,10
mesh_max: 340,340
probe_count: 7,7
algorithm: bicubic
bicubic_tension: 0.2

  
#####################################################################
#   A better print_start macro for v2/trident
#####################################################################

## *** THINGS TO UNCOMMENT: ***
## Bed mesh (2 lines at 2 locations)
## Nevermore (if you have one)
## Z_TILT_ADJUST (For Trident only)
## QUAD_GANTRY_LEVEL (For V2.4 only)
## Beacon Contact logic (if you have one. 4 lines at 4 locations)
[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
    # If QGL is not applied, first run a course calibration
    {% if printer.quad_gantry_level.applied == False %}
        _QUAD_GANTRY_LEVEL RETRY_TOLERANCE=1.0 PROBE_SPEED=10
    {% endif %}
    # then perform fine QGL down to desired spec
    # this has to be a separate macro call so the results of the above call will be visible!
    _FINE_QUAD_GANTRY_LEVEL

[gcode_macro _FINE_QUAD_GANTRY_LEVEL]
gcode:
    {% if printer.quad_gantry_level.applied == True %}
        # go for full quality at reduced probing height
        _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z=3 PROBE_SPEED=5  # <- set your preferred probing height here!
    {% else %}
        # This should never happen, just perform the full calibration using the defaults
        {action_respond_info("Fine QGL called without calling course QGL first!")}
        _QUAD_GANTRY_LEVEL  # default behavior, no speedup
    {% endif %}
    G1 Z20 F9000                    # Go up a bit
[gcode_macro PRINT_START]
gcode:
  SET_DISPLAY_TEXT MSG="Link Start!"                   # Display info on display
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.                   
  {% set target_bed = params.BED_TEMP|int %}
  {% set target_extruder = params.TOOL_TEMP|int %}
  {% if params.BED_TEMP|int > 91 %}
    M190 S118                                             # Start heating bed and hotend to 110c and 150c
  {% endif %}                                       
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}
  {% set target_buildplate = params.BUILDPLATE|default(params.BED_TEMP)|int-12 %}
  

  # Home the printer, set absolute positioning and update the Stealthburner LEDs.
  # STATUS_HOMING                                       # Set LEDs to homing-mode
  G28                                                   # Full home (XYZ)
  G90                                                   # Absolute position


  #  Uncomment for bed mesh (1 of 2 for bed mesh)
  BED_MESH_CLEAR                                       # Clear old saved bed mesh (if any)

  # Check if the target bed temp is higher than 91c - if so then trigger a heatsoak.
  {% if params.BED_TEMP|int > 91 %} #ABS
    M400                           ; wait for buffer to clear
    G4 P500                                           # Wait half a second
    # SET_HEATER_TEMPERATURE HEATER=chamber TARGET=79 [WAIT=0]
    SET_FAN_SPEED FAN=nevermore_fan SPEED=.8
    SET_DISPLAY_TEXT MSG="ABS Start!! Bed target: {target_bed}c"           # Display info on display
    M190 S118                                           # Start soaking in 120 for the bed
    M109 S210                                           
    # CLEAN_NOZZLE                                        # clean Nozzle
    # STATUS_HEATING                                    # Set LEDs to heating-mode
    M109 S150                                           
    M106 S255                                           # Turn on the PT-fan

    G1 X{x_wait} Y{y_wait} Z8 F9000                     # Go to center of the bed
    SET_DISPLAY_TEXT MSG="Heatsoak: {target_chamber}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={target_chamber}         # Waits for chamber temp
    SET_DISPLAY_TEXT MSG="Buildplate Soak: {target_buildplate}c"                          # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor buildplate" MINIMUM={target_buildplate-2}   # Waits for buildplate temp
    G4 P30000                                           # Wait 30 sec for the extra heat
    M190 S{target_bed}                                                                    # Set the target temp for the bed
    SET_DISPLAY_TEXT MSG="Target of {target_buildplate}c acheived! 60 second countdown begins"  # Display info on display
    G4 P120000                                           # Wait 2 min for the bedtemp to stabilize

  
  {% elif params.BED_TEMP|int < 71 %}   #PLA
    # M400                           ; wait for buffer to clear
    # G4 P500                                           # Wait half a second
    # SET_HEATER_TEMPERATURE HEATER=chamber TARGET=40 [WAIT=0]
    
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.2
    SET_DISPLAY_TEXT MSG="PLA Start!!"               # Display info on display
    M190 S{target_bed+20}                                  # Go above target
    SET_DISPLAY_TEXT MSG="PLA Nozzle Clean!"           # Display info on display
    # STATUS_HEATING                                    # Set LEDs to heating-mode
    G1 X{x_wait} Y{y_wait} Z8 F9000                     # Go to center of the bed
    M106 S255                                           # Turn on the PT-fan
    #custom extraheat, bed should still be set to 110c.
    SET_DISPLAY_TEXT MSG="Waiting on buildplate >:) {target_buildplate}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor buildplate" MINIMUM={target_buildplate}   # Waits for buildplate temp
    M190 S{target_bed}                                  # Go back to target
    TEMPERATURE_WAIT SENSOR="temperature_sensor buildplate" MAXIMUM={target_buildplate+10}   # Prevent too hot bed
    SET_DISPLAY_TEXT MSG="Target of {target_buildplate}c acheived! 60 second countdown begins"  # Display info on display
    G4 P120000                                           # Wait 2 min for the bedtemp to stabilize
  # If the bed temp is not over 90c, then skip the heatsoak and just heat up to dynamic bed temp
  {% else %}
    M400                           ; wait for buffer to clear
    G4 P500                                           # Wait half a second
    # SET_HEATER_TEMPERATURE HEATER=chamber TARGET=60 [WAIT=0]
    
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0.6
    SET_DISPLAY_TEXT MSG="PETG Start! Bed Target: {target_bed}c"           # Display info on display
    M190 S{target_bed+20}                                  # Go above target
    M109 S190                                           
    # CLEAN_NOZZLE                                        # clean Nozzle
    SET_DISPLAY_TEXT MSG="PETG Start!!"               # Display info on display
    # STATUS_HEATING                                    # Set LEDs to heating-mode
    G1 X{x_wait} Y{y_wait} Z8 F9000                     # Go to center of the bed
    M106 S255                                           # Turn on the PT-fan
    #custom extraheat, bed should still be set to 110c.
    SET_DISPLAY_TEXT MSG="Waiting on buildplate >:) {target_buildplate}c"  # Display info on display
    TEMPERATURE_WAIT SENSOR="temperature_sensor buildplate" MINIMUM={target_buildplate}   # Waits for buildplate temp
    M190 S{target_bed}                                  # Go back to target
    TEMPERATURE_WAIT SENSOR="temperature_sensor buildplate" MAXIMUM={target_buildplate+10}   # Prevent too hot bed
    SET_DISPLAY_TEXT MSG="Target of {target_buildplate}c acheived! 60 second countdown begins"  # Display info on display
    G4 P120000                                           # Wait 2 min for the bedtemp to stabilize
  {% endif %}

  # Heat hotend to 150c. This helps with getting a correct Z-home.
  SET_DISPLAY_TEXT MSG="Hotend: 150c"                   # Display info on display
  M109 S150                                             # Heat hotend to 150c
  
  #  Uncomment for V2.4 (Quad gantry level AKA QGL)
  SET_DISPLAY_TEXT MSG="Leveling"                       # Display info on display
  # STATUS_LEVELING                                     # Set LEDs to leveling-mode
  QUAD_GANTRY_LEVEL                                     # Level the printer via QGL
  M109 S170                                           
  # CLEAN_NOZZLE                                        # clean Nozzle
  G28 Z                                                 # Home Z again after QGL
  
  #  Uncomment for bed mesh (2 of 2 for bed mesh)
  SET_DISPLAY_TEXT MSG="Bed mesh"                       # Display info on display
  # STATUS_MESHING                                      # Set LEDs to bed mesh-mode
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5       # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh
  
  M400
  G4 P500                                           # Wait half a second
  INITIALIZE_TOOLCHANGER

  # Heat up the hotend up to target via data from slicer
  # M106 S255                                             # Turn on the PT-fan
  # SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
  # # STATUS_HEATING                                      # Set LEDs to heating-mode
  # G1 X{x_wait} Y{y_wait} Z15 F9000                      # Go to center of the bed
  # M107                                                  # Turn off partcooling fan
  # M109 S{target_extruder}                               # Heat the hotend to set temp

  # Get ready to print by doing a primeline and updating the LEDs
  SET_DISPLAY_TEXT MSG="Printer goes brr"               # Display info on display
  # STATUS_PRINTING                                       # Set LEDs to printing-mode




  # M109 S0 # Stop to heat, the actual printing may happen with a different hotend.
  # # Preheat all the hotends in use
  # {% for tool_nr in printer.toolchanger.tool_numbers %}
  #   {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
  #   {% if tooltemp_param in params %}
  #     M104 T{tool_nr} S{params[tooltemp_param]} #change to M109 (use M104 if not working)
  #   {% endif %}
  # {% endfor %}

  # {% if params.TOOL is defined %}
  #   T{params.TOOL}
  # {% endif %}
  # M117 Heating up the hotend
  # G90 ; Absolute positioning
  # G92 E0 ; Zero extruder
  # M106 S100 ; Start part cooling fan, 255=100%
  # G0 X345 Y175 F3000
  # PRIME_LINES INITIAL_TOOL={params.TOOL}
  # M109 S{ params.TOOL_TEMP }
  # _TOOLCHANGER_PRINT_START_END
  # #BED_MESH_PROFILE LOAD=default
  # M117 Printing
  
  # M104 S0 # Stop to heat, the actual printing may happen with a different hotend.

  # # Preheat all the hotends in use
  # {% for tool_nr in printer.toolchanger.tool_numbers %}
  #   {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
  #   {% if tooltemp_param in params %}
  #     M104 T{tool_nr} S{params[tooltemp_param]}
  #   {% endif %}
  # {% endfor %}
  
  # START_TOOL_PROBE_CRASH_DETECTION
  # PRIME_LINES INITIAL_TOOL={params.TOOL}
  # _TOOLCHANGER_PRINT_START_END

  M117 Printing
  M400                           ; wait for buffer to clear
  G0 Z0.01
  G4 P500                                           # Wait half a second
  M400                           ; wait for buffer to clear
  M400                           ; wait for buffer to clear
  G4 P500                                           # Wait half a second
  AUTO_PURGE {rawparams}
  M400                           ; wait for buffer to clear
  G0 Z0.01
  M400                           ; wait for buffer to clear
  G0 Z0.01
  G4 P500                                           # Wait half a second
  M400                           ; wait for buffer to clear
  # G0 X{x_wait - 50} Y4 F10000                           # Go to starting point
  # G0 Z0.4                                               # Raise Z to 0.4
  # G91                                                   # Incremental positioning    
  # G1 X100 E20 F1000                                     # Primeline
  # G90                                                   # Absolute position



[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-5.0 F1800                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    T0
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107                                     ; turn off fan
    
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    SET_FAN_SPEED FAN=nevermore_fan SPEED=0

[shaketune]
# result_folder: ~/printer_data/config/ShakeTune_results
#    Path where the processed results will be stored. If the folder doesn't exist,
#    it will be automatically created. You can change this if you'd like to store 
#    results in a different location.
number_of_results_to_keep: 30
#    This setting defines how many results you want to keep in the result folder.
#    Once the specified number is exceeded, older results will be automatically deleted
#    to free up space on the SD card and avoid cluttering the results folder.
keep_raw_data: False
#    If set to True, Shake&Tune will store both the processed graphs and the raw accelerometer
#    .stdata files in the results folder. This can be useful for debugging or archiving purposes.
#    Please always attach them when reporting any issues on GitHub or Discord.
show_macros_in_webui: True
#    Mainsail and Fluidd doesn't create buttons for system commands (macros that are not part
#    of the printer.cfg file). This option allow Shake&Tune to inject them into the webui at runtime.
#    If set to False, the macros will be hidden but still accessible from the console by typing
#    their names manually, which can be useful if you prefer to encapsulate them into your own macros.
timeout: 600
#    This defines the maximum processing time (in seconds) to allows to Shake&Tune for generating 
#    graphs from a .stdata file. 10 minutes should be more than enough in most cases, but if you have
#    slower hardware (e.g., older SD cards or low-performance devices), increase it to prevent timeouts.
measurements_chunk_size: 2
#    Each Shake&Tune command uses the accelerometer to take multiple measurements. By default,
#    Shake&Tune will write a chunk of data to disk every two measurements, and at the end of the
#    command will merge these chunks into the final .stdata file for processing. "2" is a very
#    conservative setting to avoid Klipper Timer Too Close errors on lower end devices with little
#    RAM, and should work for everyone. However, if you are using a powerful computer, you may
#    wish to increase this value to keep more measurements in memory (e.g., 15-20) before writing
#    the chunk and avoid stressing the filesystem too much.
max_freq: 250
#    This setting defines the maximum frequency at which the calculation of the power spectral density
#    is cutoff. The default value should be fine for most machines and accelerometer combinations and
#    avoid touching it unless you know what you're doing.
dpi: 300
#    Controls the resolution of the generated graphs. The default value of 300 dpi was optimized
#    and strikes a balance between performance and readability, ensuring that graphs are clear
#    without using too much RAM to generate them. Usually, you shouldn't need to change this value.

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 56.6
damping_ratio_x = 0.036 
#11360 max

shaper_type_y = mzv
shaper_freq_y = 38.4
damping_ratio_y = 0.051
#4360 max



[resonance_tester]
accel_chip: adxl345 T0
probe_points:
     175, 175, 20  
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0


