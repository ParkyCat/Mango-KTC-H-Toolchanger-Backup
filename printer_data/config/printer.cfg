

[include mainsail.cfg]
[include toolchanger/toolchanger-include.cfg]
[include PrinterMacros.cfg]
[include prime_lines.cfg]
    
[force_move]
enable_force_move: True

[rounded_path]
resolution: 0.2
replace_g0: False

#####################################################################
#   UUID Setting
#####################################################################
# host MCU service is preinstalled and ready to use with:
[mcu]
canbus_uuid: abcbe6398cf5

[printer]
kinematics: corexy
max_velocity: 400  
max_accel: 7000    			
# max_z_velocity: 180		
max_z_velocity: 33.3			
max_z_accel: 1000
square_corner_velocity: 5.0

#test Autotune
[autotune_tmc stepper_x]
motor: ldo-42sth48-2804ah
tuning_goal: performance
# extra_hysteresis: 1
sgt: 1
[autotune_tmc stepper_y]
motor: ldo-42sth48-2804ah
tuning_goal: performance
# extra_hysteresis: 1
sgt: 1

[autotune_tmc stepper_z]
motor: moons-ms17hd6p4200
tuning_goal: performance
# extra_hysteresis: 1
[autotune_tmc stepper_z1]
motor: moons-ms17hd6p4200
tuning_goal: performance
# extra_hysteresis: 1
[autotune_tmc stepper_z2]
motor: moons-ms17hd6p4200
tuning_goal: performance
# extra_hysteresis: 1
[autotune_tmc stepper_z3]
motor: moons-ms17hd6p4200
tuning_goal: performance
# extra_hysteresis: 1

# [autotune_tmc extruder]
# motor: moons-ms17hd6p420I-05
# tuning_goal: performance

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin = PE6
dir_pin = PE5
enable_pin = !PC14
microsteps = 32
rotation_distance: 40
endstop_pin = tmc2240_stepper_x:virtual_endstop
position_min: -2
position_endstop: 350
position_max: 350
homing_speed = 100
homing_positive_dir = true

[tmc2240 stepper_x]
cs_pin = PC13
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
spi_software_mosi_pin = PG6
diag0_pin = ^!PF4
interpolate = True
run_current = 1.3
# stealthchop_threshold = 0
rref: 12000 

[stepper_y]
step_pin = PE2
dir_pin = PE1
enable_pin = !PE4
microsteps = 32
rotation_distance: 40
endstop_pin = tmc2240_stepper_y:virtual_endstop
position_min: -9
position_endstop: 350
position_max: 350
homing_speed = 100
homing_positive_dir = true

[tmc2240 stepper_y]
cs_pin = PE3
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
spi_software_mosi_pin = PG6
diag0_pin = ^!PF3
interpolate = True
run_current = 1.3
rref: 12000 
# stealthchop_threshold = 0


#####################################################################
# 	Z Stepper Settings
#####################################################################
[stepper_z]
step_pin = PB8
dir_pin = !PB7
enable_pin = !PE0
microsteps = 32
rotation_distance = 40
gear_ratio = 80:16
full_steps_per_rotation = 200
# endstop_pin = probe:z_virtual_endstop
endstop_pin: probe:z_virtual_endstop
position_max = 340
position_min = -6.0
homing_speed = 15
second_homing_speed = 8
homing_retract_dist = 3

[stepper_z1]
step_pin = PB4
dir_pin = PB3
enable_pin = !PB6
rotation_distance = 40
gear_ratio = 80:16
full_steps_per_rotation = 200
microsteps = 32

[stepper_z2]
step_pin = PG13
dir_pin = !PG12
enable_pin = !PG15
rotation_distance = 40
gear_ratio = 80:16
full_steps_per_rotation = 200
microsteps = 32

[stepper_z3]
step_pin = PG9
dir_pin = PD7
enable_pin = !PG11
rotation_distance = 40
gear_ratio = 80:16
full_steps_per_rotation = 200
microsteps = 32

[tmc2240 stepper_z]
cs_pin = PB9
spi_software_mosi_pin = PG6
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
run_current = 1
# stealthchop_threshold = 0
interpolate: True
rref: 12000 

[tmc2240 stepper_z1]
cs_pin = PB5
spi_software_mosi_pin = PG6
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
run_current = 1
# stealthchop_threshold = 0
interpolate: True
rref: 12000 

[tmc2240 stepper_z2]
cs_pin = PG14
spi_software_mosi_pin = PG6
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
run_current = 1
# stealthchop_threshold = 0
interpolate: True
rref: 12000 

[tmc2240 stepper_z3]
cs_pin = PG10
spi_software_mosi_pin = PG6
spi_software_miso_pin = PG7
spi_software_sclk_pin = PG8
run_current = 1
# stealthchop_threshold = 0
interpolate: True
rref: 12000 




[heater_bed]
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PB1
max_power: 1.0
min_temp: 0
max_temp: 120
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769

[temperature_sensor buildplate]
sensor_type: Generic 3950
sensor_pin: PB0
min_temp: -40
max_temp: 120


[temperature_sensor CM4]
sensor_type: temperature_host



[multi_pin controller_fans]
pins: PF7,PF9

[controller_fan controller_fan]
##  Controller fan
pin: multi_pin:controller_fans
max_power: 1
kick_start_time: 1
fan_speed: 0.25
heater: heater_bed

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PC5
min_temp: -40
max_temp: 100

[temperature_sensor chamberUpper]
sensor_type: Generic 3950
sensor_pin: PC4
min_temp: -40
max_temp: 100

[temperature_sensor chamberRear]
sensor_type: Generic 3950
sensor_pin: PA7
min_temp: -40
max_temp: 100


[temperature_sensor chamberTool0]
sensor_type:MAX31865
sensor_pin: EBB0: PA4
spi_bus: spi1
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2

[fan_generic nevermore_fan]
#  Exhaust fan - Nevermore Filter
pin: PF6
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 1.0




