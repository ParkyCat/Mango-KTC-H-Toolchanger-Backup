# This file contains common pin mappings for the BIGTREETECH EBB36 V1.2.
# To use this config, the firmware should be compiled for the 
# STM32G0B1 with "8 MHz crystal" and "CAN bus (on PB0/PB1)".

# change the mcu section name to the tool board you are configuring:
# EBB0, EBB1, etc.
[mcu EBB2]
canbus_uuid: 3213920eafe6
# [include T0.cfg]  #8561083a1c5b
# [include T1.cfg]  #b1096733285e
# [include T2.cfg]  #3213920eafe6
# [include T3.cfg]  #1cf3c0580751

# change the accelerometer section name to the tool you are configuring:
# T0, T1, etc.
[adxl345 T2]
cs_pin: EBB2:PB12
spi_software_sclk_pin: EBB2:PB10
spi_software_mosi_pin: EBB2:PB11
spi_software_miso_pin: EBB2:PB2
axes_map: x,z,-y

[temperature_sensor EBB2_MCU]
sensor_type: temperature_mcu
sensor_mcu: EBB2
min_temp: 0
max_temp: 100


# change to the extruder section you are configuring:
# extruder, extruder1, etc.
[extruder2] # Orbiter2.5 with CHCB-V Hotend
step_pin: EBB2:PD0
dir_pin: EBB2:PD1
enable_pin: !EBB2:PD2
heater_pin: EBB2:PB13
sensor_pin: EBB2:PA3
microsteps: 16
rotation_distance: 53  # Re-calibrate your own value
# full_steps_per_rotation: 200
# max_extrude_only_distance: 101
gear_ratio: 44:10, 37:17
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 500
sensor_type: Generic 3950
pressure_advance: 0.030
pressure_advance_smooth_time: 0.015
control: pid #pid_Kp=40.353 pid_Ki=13.451 pid_Kd=30.264
pid_Kp: 40.353
pid_Ki: 13.451
pid_Kd: 30.264
min_temp: 0
max_temp: 305
min_extrude_temp: 0

# change the tmc2209 section name to match the extruder you are configuring:
# extruder, extruder1, etc.
[tmc2209 extruder2] # Orbiter2.5
uart_pin: EBB2:PA15
run_current: 0.55
stealthchop_threshold: 999999999
sense_resistor: 0.11

# change the heater_fan section name to match the tool you are configuring:
# T0_hotend_fan, T1_hotend_fan, etc.
[heater_fan T2_hotend_fan]
pin: EBB2:PA0
heater: extruder2 # change to match the extruder you are configuring: extruder, extruder1, etc.
max_power: 1.0
kick_start_time: 2.0
heater_temp: 50.0
##  If you are experiencing back flow, you can reduce fan_speed
fan_speed: 0.8

# change the fan_generic section name to the tool you are configuring:
# T0_partfan, T1_partfan, etc.
[fan_generic T2_part_fan]
pin: EBB2:PA1

# change the tool section name to the tool you are configuring:
# T0, T1, etc.
[tool T2]
detection_pin: ^!EBB2:PB6
tool_number: 2 # change to the index of the tool. 0, 1, 2, etc.
extruder: extruder2 # change to match the extruder you are configuring: extruder, extruder1, etc.
fan: T2_part_fan
params_park_x: 172.4 # The absolute X-position of the tool in its dock.
params_park_y: 18.30 # The absolute Y-position of the tool in its dock.
params_park_z: 332.000 # The absolute Z-position where the tool and shuttle mate in the dock, determined when the TAP (or Z-probe) triggers.
gcode_x_offset: 0.253125 # The X-Axis offset of the nozzle's orifice in relation to tool 0 0.287500,0.021875,0.206250
gcode_y_offset: 0.021875 # The Y-Axis offset of the nozzle's orifice in relation to tool 0
gcode_z_offset: 0.081250 # The Z-Axis offset of the nozzle's orifice in relation to tool 0
#Tool offset is 0.253125,0.021875,0.081250



# Results from input shaper
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 68
params_input_damping_ratio_x: 0.051 
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 45.6
params_input_damping_ratio_y: 0.086

# change the tool_probe section name to the tool you are configuring:
# T0, T1, etc.
[tool_probe T2]
pin: ^EBB2:PB6
tool: 2 # change to the index of the tool. 0, 1, 2, etc.
z_offset = 0 # Needs to be calibrated. More positive = More Squish
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder2 # change to match the extruder you are configuring: extruder, extruder1, etc.

# change the neopixel section name to the tool you are configuring:
# T0, T1, etc.
# [neopixel T2]
# pin: EBB2:PD3
# color_order: GRBW
# chain_count: 23
# initial_RED: 0.5
# initial_GREEN: 0.0
# initial_BLUE: 0.5
# initial_WHITE: 0.0

# change the gcode_macro section name to the tool you are configuring:
# T0, T1, etc.
[gcode_macro T2]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=2 # change to the index of the tool. 0, 1, 2, etc.




